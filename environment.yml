name: dpsurv
channels:
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
    # PyTorch with CUDA 12.1 — change cu121 to match your driver if needed
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.5.1+cu121
    # Numerical / data
    - numpy==1.26.4
    - pandas==2.2.2
    - scipy==1.13.1
    - h5py==3.11.0
    # Machine learning
    - scikit-learn==1.6.1
    # Survival analysis
    - scikit-survival==0.23.0
    - pycox==0.3.0
    # Utilities
    - tqdm==4.66.4
    # Visualization (required for notebooks)
    - matplotlib==3.9.4
    - seaborn==0.13.2
    - opencv-python==4.12.0.88
    - Pillow==11.2.1
    - openslide-python==1.4.2
    # Notebooks
    - ipykernel
    - jupyter
